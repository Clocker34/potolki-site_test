<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Потолки Мастер{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#1a3a5c',
                            mid: '#2980b9',
                            accent: '#e67e22',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- Навигация — кнопка Админ убрана -->
    <header class="bg-brand-dark text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-white hover:text-blue-200 transition">
                🏠 Потолки Мастер
            </a>
            <nav class="flex gap-8 text-sm font-medium">
                <a href="/" class="text-1x font-bold text-white hover:text-blue-200 transition mt-2">Главная</a>
                <a href="/" class="text-1x font-bold text-white hover:text-blue-200 transition mt-2">Услуги</a>
                <a href="/" class="text-1x font-bold text-white hover:text-blue-200 transition mt-2">Портфолио</a>
                <a href="/order" class="bg-brand-accent text-white px-3 py-2 rounded-full hover:opacity-90 transition font-semibold">
                    Оставить заявку
                </a>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10 min-h-screen">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-brand-dark text-blue-200 text-center py-6 text-lg">
        © 2026 Потолки Мастер &nbsp;|&nbsp; Тел: +7 (999) 123-45-67
    </footer>

</body>
</html>
